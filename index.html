<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>CELSUX PRO M4 - ONLINE</title>
    <meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; background-color: #ffffff !important; font-family: sans-serif; }
        #stageArea { z-index: 1; position: absolute; inset: 0; }
        /* LANZADOR */
        #lanzador { position: fixed; inset: 0; background: #111; z-index: 3000000; display: flex; justify-content: center; align-items: center; }
        #btn-iniciar { padding: 30px 60px; font-size: 2em; font-weight: bold; color: white; background: #007aff; border: none; border-radius: 20px; cursor: pointer; }
        /* PANEL OPERADOR */
        #panel-operador { position: fixed; inset: 0; background: #000 !important; color: white; display: none; flex-direction: column; padding: 30px; box-sizing: border-box; z-index: 4000000; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .led-sync { width: 30px; height: 30px; border-radius: 50%; background: #ff4444; border: 2px solid #222; }
        .info-card { background: #111; padding: 20px; border-radius: 15px; flex: 1; text-align: center; border: 1px solid #222; }
        .info-val { font-size: 3em; font-weight: bold; color: #007aff; margin-top: 10px; }
        .btn-container { position: relative; width: 100%; height: 180px; margin-top: 30px; border-radius: 25px; overflow: hidden; background: #ff4444; }
        .btn-progress { position: absolute; left: 0; top: 0; height: 100%; width: 100%; background: #007aff; z-index: 1; }
        .btn-trigger { position: absolute; inset: 0; background: transparent; border: none; color: white; font-size: 4.5em; font-weight: bold; cursor: pointer; z-index: 2; }
    </style>
</head>
<body id="body">
    <div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div>
    
    <script src="assets/player/main.js"></script>

    <div id="lanzador">
        <button id="btn-iniciar" onclick="lanzar()">INICIAR SISTEMA</button>
    </div>

    <div id="panel-operador">
        <div class="header">
            <h1 style="color:#007aff; margin:0;">CELSUX PRO M4</h1>
            <div id="sync-led" class="led-sync"></div>
        </div>
        <div style="display:flex; gap:20px; margin:20px 0;">
            <div class="info-card"><div>DISPARO</div><div id="val-click" class="info-val">1 / 14</div></div>
            <div class="info-card"><div>DIAPO</div><div id="val-slide" class="info-val">-</div></div>
        </div>
        <div id="mensajes-operador" style="flex-grow:1; background:#111; border-radius:20px; padding:20px; font-size:2em; text-align:center; display:flex; align-items:center; justify-content:center;">Esperando...</div>
        <div class="btn-container">
            <div id="barra-progreso" class="btn-progress"></div>
            <button id="btn-siguiente" class="btn-trigger" onclick="enviar()">SIGUIENTE</button>
        </div>
    </div>

    <script>
        const canal = new BroadcastChannel('celsux_m4_final');
        let modo = window.location.hash.replace('#', '');
        let nClick = 1;
        let latido = 0;

        function lanzar() {
            // Abrimos las ventanas con el nombre del archivo actual
            const url = window.location.origin + window.location.pathname;
            window.open(url + '#presentacion', 'MonitorLG', 'width=1280,height=720');
            window.open(url + '#operador', 'ControlM4', 'width=1000,height=800');
            document.getElementById('lanzador').innerHTML = '<h2 style="color:white;">Sistema Activo.</h2>';
        }

        if (modo === 'operador') {
            document.getElementById('lanzador').style.display = 'none';
            document.getElementById('panel-operador').style.display = 'flex';
            window.enviar = () => {
                canal.postMessage({ tipo: 'FIRE', n: nClick });
                const b = document.getElementById('barra-progreso');
                const btn = document.getElementById('btn-siguiente');
                btn.disabled = true; b.style.transition = 'none'; b.style.width = '0%';
                setTimeout(() => { b.style.transition = 'width 2s linear'; b.style.width = '100%'; }, 50);
                nClick++;
                document.getElementById('val-click').innerText = nClick + " / 14";
                setTimeout(() => { btn.disabled = false; }, 2000);
            };
            canal.onmessage = (e) => {
                if (e.data.tipo === 'ALIVE') {
                    latido = Date.now();
                    document.getElementById('sync-led').style.background = '#00ff00';
                    document.getElementById('val-slide').innerText = e.data.slide;
                }
            };
            setInterval(() => { if (Date.now() - latido > 2000) document.getElementById('sync-led').style.background = '#ff4444'; }, 1000);

        } else if (modo === 'presentacion') {
            document.getElementById('lanzador').style.display = 'none';
            // Forzar fondo negro desde el inicio en el monitor
            document.body.style.setProperty('background-color', '#000000', 'important');
            
            // Intentar arrancar el player cada 1 segundo hasta que conecte
            const checkPlayer = setInterval(() => {
                if (window.kpfPlayer) {
                    window.kpfPlayer.play();
                    clearInterval(checkPlayer);
                }
            }, 1000);

            canal.onmessage = (e) => {
                if (e.data.tipo === 'FIRE') {
                    if (window.kpfPlayer) {
                        if (!window.kpfPlayer.isPlaying) window.kpfPlayer.play();
                        else window.kpfPlayer.controller.showNextScene();
                    }
                }
            };
            setInterval(() => {
                let s = (window.kpfPlayer) ? window.kpfPlayer.currentSlideIndex + 1 : '-';
                canal.postMessage({ tipo: 'ALIVE', slide: s });
            }, 500);
        }
    </script>
</body>
</html>
