<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>CELSUX PRO M4 - FORCE</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; background-color: #000 !important; color: white; font-family: sans-serif; }
        #stageArea { position: absolute; inset: 0; z-index: 1; }
        #lanzador { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #btn-iniciar { padding: 30px 60px; font-size: 2em; background: #007aff; color: white; border: none; border-radius: 20px; cursor: pointer; }
        #panel-operador { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; padding: 20px; z-index: 10000; }
        .info-card { background: #111; padding: 15px; border-radius: 10px; flex: 1; text-align: center; border: 1px solid #333; }
        .info-val { font-size: 2.5em; font-weight: bold; color: #007aff; }
        .btn-trigger { width: 100%; height: 150px; background: #007aff; color: white; font-size: 3em; font-weight: bold; border: none; border-radius: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="stageArea">
        <div id="stage" class="stage"></div>
        <div id="hyperlinkPlane" class="stage"></div>
    </div>

    <script src="assets/player/main.js"></script>

    <div id="lanzador">
        <button id="btn-iniciar" onclick="lanzar()">INICIAR SISTEMA ONLINE</button>
        <p style="margin-top:20px; color:#666;">Si no abren las ventanas, permití los "pop-ups" arriba.</p>
    </div>

    <div id="panel-operador">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>CELSUX OPERADOR</h2>
            <div id="sync-led" style="width:20px; height:20px; border-radius:50%; background:red;"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="info-card"><div>DISPARO</div><div id="val-click" class="info-val">1</div></div>
            <div class="info-card"><div>DIAPO</div><div id="val-slide" class="info-val">-</div></div>
        </div>
        <button id="btn-siguiente" class="btn-trigger" onclick="enviar()">SIGUIENTE</button>
    </div>

    <script>
        const canal = new BroadcastChannel('celsux_m4_final');
        let modo = window.location.hash.replace('#', '');
        let nClick = 1;

        function lanzar() {
            const url = window.location.href.split('#')[0];
            window.open(url + '#presentacion', 'MonitorLG', 'width=1920,height=1080');
            window.open(url + '#operador', 'ControlM4', 'width=1000,height=800');
        }

        if (modo === 'operador') {
            document.getElementById('lanzador').style.display = 'none';
            document.getElementById('panel-operador').style.display = 'flex';
            window.enviar = () => {
                canal.postMessage({ tipo: 'FIRE', n: nClick });
                nClick++;
                document.getElementById('val-click').innerText = nClick;
            };
            canal.onmessage = (e) => {
                if (e.data.tipo === 'ALIVE') {
                    document.getElementById('sync-led').style.background = '#00ff00';
                    document.getElementById('val-slide').innerText = e.data.slide;
                }
            };
        } else if (modo === 'presentacion') {
            document.getElementById('lanzador').style.display = 'none';
            
            // Re-intento infinito de play
            setInterval(() => {
                if (window.kpfPlayer && !window.kpfPlayer.isPlaying) {
                    window.kpfPlayer.play();
                }
            }, 1000);

            canal.onmessage = (e) => {
                if (e.data.tipo === 'FIRE' && window.kpfPlayer) {
                    if (window.kpfPlayer.controller) window.kpfPlayer.controller.showNextScene();
                }
            };

            setInterval(() => {
                if (window.kpfPlayer) {
                    canal.postMessage({ tipo: 'ALIVE', slide: window.kpfPlayer.currentSlideIndex + 1 });
                }
            }, 500);
        }
    </script>
</body>
</html>
