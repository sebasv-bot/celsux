<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>CELSUX 2407 - M4 ESTABLE (FINAL)</title>
    <meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style>
        /* ESTADO INICIAL LG: BLANCO */
        html, body { 
            margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
            background-color: #ffffff !important; font-family: sans-serif;
            /* BLOQUEO DE SELECCIÓN VISUAL */
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        
        #stageArea { z-index: 1; position: absolute; inset: 0; }

        /* PUNTO DE TEST MINÚSCULO */
        #dot { position: fixed; top: 0; left: 0; width: 4px; height: 4px; background: #0f0; z-index: 2000001; opacity: 0; }

        /* LANZADOR UNICO */
        #lanzador {
            position: fixed; inset: 0; background: #111; z-index: 3000000;
            display: flex; justify-content: center; align-items: center;
        }
        #btn-iniciar {
            padding: 30px 60px; font-size: 2em; font-weight: bold; color: white; background: #007aff;
            border: none; border-radius: 20px; cursor: pointer;
        }

        /* PANEL OPERADOR - NEGRO TOTAL */
        #panel-operador {
            position: fixed; inset: 0; background: #000 !important; color: white;
            display: none; flex-direction: column; padding: 30px; 
            box-sizing: border-box; z-index: 4000000;
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .led-sync { width: 30px; height: 30px; border-radius: 50%; background: #ff4444; border: 2px solid #222; }
        
        .status-bar { display: flex; gap: 20px; margin-top: 20px; margin-bottom: 20px; }
        .info-card { background: #111; padding: 20px; border-radius: 15px; flex: 1; text-align: center; border: 1px solid #222; }
        .info-val { font-size: 3em; font-weight: bold; color: #007aff; margin-top: 10px; }

        .caja-mensajes {
            flex-grow: 1; background: #111; border-radius: 20px; padding: 30px; 
            font-size: 2.5em; border: 1px solid #222; overflow-y: auto; line-height: 1.3;
            display: flex; align-items: center; justify-content: center; text-align: center; color: #ccc;
        }

        /* BOTON ANIMADO DE COLOR VACIABLE */
        .btn-container {
            position: relative; width: 100%; height: 180px; margin-top: 30px;
            border-radius: 25px; overflow: hidden; background: #ff4444; 
        }
        .btn-progress {
            position: absolute; left: 0; top: 0; height: 100%; width: 100%; 
            background: #007aff; z-index: 1;
        }
        .btn-trigger {
            position: absolute; inset: 0; background: transparent; border: none;
            color: white; font-size: 4.5em; font-weight: bold; cursor: pointer; z-index: 2;
        }

        .bloqueo-seguridad { position: fixed; inset: 0; background: #000; color: #fff; z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    </style>
</head>
<body id="body" oncontextmenu="return false;" ondragstart="return false;">
    <div id="dot"></div>
    <div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div>
    <div id="slideshowNavigator"></div>
    <div id="slideNumberControl"></div>
    <div id="slideNumberDisplay"></div>
    <div id="helpPlacard"></div>
    <div id="waitingIndicator"><div id="waitingSpinner"></div></div>
    
    <script src="assets/player/main.js"></script>

    <div id="lanzador">
        <button id="btn-iniciar" onclick="lanzar()">INICIAR SISTEMA</button>
    </div>

    <div id="panel-operador">
        <div class="header">
            <h1 style="color:#007aff; margin:0; font-size: 2.5em;">CELSUX PRO M4</h1>
            <div style="display:flex; align-items:center; gap: 15px;">
                <span style="font-size: 1.5em; color: #888; font-weight: bold;">SYNC</span>
                <div id="sync-led" class="led-sync"></div>
            </div>
        </div>

        <div class="status-bar">
            <div class="info-card">
                <div style="color:#888; font-size:1.2em; font-weight:bold;">DISPARO ACTUAL</div>
                <div id="val-click" class="info-val">1 / 14</div>
            </div>
            <div class="info-card">
                <div style="color:#888; font-size:1.2em; font-weight:bold;">DIAPOSITIVA</div>
                <div id="val-slide" class="info-val">-</div>
            </div>
        </div>

        <div class="caja-mensajes" id="mensajes-operador">
            Esperando conexión con la presentación...
        </div>
        
        <div class="btn-container">
            <div id="barra-progreso" class="btn-progress"></div>
            <button id="btn-siguiente" class="btn-trigger" onclick="enviar()">SIGUIENTE</button>
        </div>
    </div>

    <script>
        // --- PROTECCIÓN ANTIPIRONES ---
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            if (e.metaKey && e.altKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'U'.charCodeAt(0))) return false; // Mac
        };

        // --- SEGURIDAD FECHA ---
        (function() {
            const fechaLimite = new Date(2026, 3, 29);
            if (new Date() >= fechaLimite) {
                document.body.innerHTML = '<div class="bloqueo-seguridad"><h1 style="font-size: 3em; color: #ff4444;">SISTEMA EXPIRADO</h1><p style="font-size: 2em; font-weight: bold; margin-top: 20px;">Comunicarse al: 1156401405</p></div>';
                window.stop();
                throw new Error("Expirado");
            }
        })();

        // --- LÓGICA CORE ---
        const TIEMPOS = { 1: 3, 2: 20, 3: 12, 4: 5, 5: 20, 6: 12, 7: 5, 8: 20, 9: 12, 10: 7, 11: 20, 12: 12, 13: 7, 14: 7};
        const MENSAJES_POR_DIAPO = {
            1: "ATENCIÓN: Prepararse para iniciar.<br>Siguiente clic arranca presentación.",
            2: "DIAPO 2: Tiempos de 17s, 12s, 5s y 17s.",
            3: "DIAPO 3: Tiempos de 12s, 5s y 17s.",
            4: "DIAPO 4: Tiempos de 12s, 7s y 17s.",
            5: "DIAPO 5: Cierre. Tiempos de 12s, 7s y 7s."
        };

        const canal = new BroadcastChannel('celsux_m4_final');
        let modo = window.location.hash.replace('#', '');
        let nClick = 1;
        let latido = 0;

        function lanzar() {
            const base = window.location.href.split('#')[0].split('?')[0];
            window.open(base + '#presentacion', 'MonitorLG', 'width=1920,height=1080');
            window.open(base + '#operador', 'ControlM4', 'width=1200,height=900');
            document.getElementById('lanzador').innerHTML = '<h2 style="color:#555; font-size: 2em;">Sistema en ejecución...</h2>';
        }

        if (modo === 'operador') {
            document.getElementById('lanzador').style.display = 'none';
            document.getElementById('panel-operador').style.display = 'flex';

            window.enviar = () => {
                const btn = document.getElementById('btn-siguiente');
                if (nClick > 14 || btn.disabled) return;
                canal.postMessage({ tipo: 'FIRE', n: nClick });
                const t = TIEMPOS[nClick] || 1.2;
                const barra = document.getElementById('barra-progreso');
                btn.disabled = true;
                barra.style.transition = 'none';
                barra.style.width = '0%'; 
                setTimeout(() => {
                    barra.style.transition = 'width ' + t + 's linear';
                    barra.style.width = '100%';
                }, 50);
                nClick++;
                document.getElementById('val-click').innerText = nClick <= 14 ? nClick + " / 14" : "FIN";
                setTimeout(() => { btn.disabled = false; }, t * 1000);
            };

            canal.onmessage = (e) => {
                if (e.data.tipo === 'ALIVE') {
                    latido = Date.now();
                    document.getElementById('sync-led').style.background = '#00ff00';
                    document.getElementById('val-slide').innerText = e.data.slide;
                    const msj = MENSAJES_POR_DIAPO[e.data.slide] || "<i>(Sin indicaciones)</i>";
                    document.getElementById('mensajes-operador').innerHTML = msj;
                }
            };

            setInterval(() => {
                if (Date.now() - latido > 1500) document.getElementById('sync-led').style.background = '#ff4444';
            }, 1000);

        } else if (modo === 'presentacion') {
            document.getElementById('lanzador').style.display = 'none';
            const anclaje = setInterval(() => {
                if (window.kpfPlayer) { window.kpfPlayer.pause(); clearInterval(anclaje); }
            }, 50);

            canal.onmessage = (e) => {
                if (e.data.tipo === 'FIRE') {
                    const d = document.getElementById('dot');
                    d.style.opacity = 1; setTimeout(()=> d.style.opacity = 0, 100);
                    if (e.data.n === 1) document.body.style.setProperty('background-color', '#000000', 'important');
                    const evento = new KeyboardEvent('keydown', { keyCode: 39, which: 39, bubbles: true });
                    document.dispatchEvent(evento);
                    if (window.kpfPlayer) {
                        if (!window.kpfPlayer.isPlaying) window.kpfPlayer.play();
                        else if (window.kpfPlayer.controller) window.kpfPlayer.controller.showNextScene();
                    }
                }
            };

            setInterval(() => {
                let slideIdx = '-';
                if (window.kpfPlayer && window.kpfPlayer.currentSlideIndex !== undefined) {
                    slideIdx = window.kpfPlayer.currentSlideIndex + 1; 
                }
                canal.postMessage({ tipo: 'ALIVE', slide: slideIdx });
            }, 500);
        }
    </script>
</body>
</html>
